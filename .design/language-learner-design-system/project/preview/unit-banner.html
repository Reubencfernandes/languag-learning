<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:var(--font-sans);display:flex;flex-direction:column;gap:12px}
  .banner{height:55px;border-radius:8px;padding:0 14px;display:flex;flex-direction:column;justify-content:center;width:340px}
  .eyebrow{font-size:14px;font-weight:700;color:#868686;letter-spacing:.04em}
  .sub{font-size:14px;color:var(--ll-ink-2)}
  .green{background:var(--ll-green-400)}
  .blue{background:var(--ll-blue-500)}
  .blue .eyebrow,.blue .sub{color:rgba(255,255,255,.9)}
</style></head>
<body>
  <div class="banner green">
    <div class="eyebrow">UNIT 1</div>
    <div class="sub">blah blah</div>
  </div>
  <div class="banner blue">
    <div class="eyebrow">UNIT 2</div>
    <div class="sub">blah blah</div>
  </div>
</body></html>
