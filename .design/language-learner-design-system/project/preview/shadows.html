<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);display:flex;gap:26px;flex-wrap:wrap;align-items:flex-end}
  .r{display:flex;flex-direction:column;align-items:center;gap:8px}
  .lbl{font-size:11px;font-family:ui-monospace,monospace;color:var(--fg-soft);text-align:center}
  .node{width:78px;height:74px;border-radius:50%;position:relative}
  .halo{position:absolute;inset:-7px -6px;background:var(--ll-gray-150);border-radius:50%;z-index:-1}
  .n-wrap{position:relative}
  .card{width:180px;height:90px;background:#fff;border:1px solid var(--border-soft);border-radius:12px;box-shadow:var(--shadow-card)}
</style></head>
<body>
  <div class="r">
    <div class="n-wrap"><div class="halo"></div><div class="node" style="background:var(--ll-yellow-400)"></div></div>
    <div class="lbl">--shadow-node<br>halo + 6px flat</div>
  </div>
  <div class="r">
    <div class="card"></div>
    <div class="lbl">--shadow-card<br>1px card lift</div>
  </div>
  <div class="r">
    <div style="width:180px;height:44px;border-radius:20px;background:var(--ll-black);box-shadow:var(--shadow-cta)"></div>
    <div class="lbl">--shadow-cta<br>CTA pill on scroll</div>
  </div>
</body></html>
