<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:30px;background:#fff;font-family:var(--font-sans);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .pill{height:44px;border-radius:20px;display:inline-flex;align-items:center;gap:8px;padding:0 22px;background:var(--ll-black);color:#fff;font-size:15px;font-weight:500;box-shadow:var(--shadow-cta)}
  .pill svg{width:14px;height:14px}
  .bar{height:55px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:500;padding:0 24px;min-width:260px}
  .bar.blue{background:var(--ll-blue-500)}
  .bar.green{background:var(--ll-green-400);color:#000}
  .ghost{height:44px;border-radius:20px;padding:0 22px;background:transparent;border:1px solid var(--border);color:var(--fg);font-size:15px;font-weight:500;display:inline-flex;align-items:center}
</style></head>
<body>
  <span class="pill">Get started <svg viewBox="0 0 10 10" fill="currentColor"><path d="M2 0l6 5-6 5z"/></svg></span>
  <span class="bar blue">CHECK</span>
  <span class="bar green">UNIT 1 · blah blah</span>
  <span class="ghost">Cancel</span>
</body></html>
