<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @font-face{font-family:"Geist";src:url("../fonts/Geist-VariableFont_wght.ttf") format("truetype-variations");font-weight:100 900;font-display:swap}
  body{margin:0;padding:28px;background:#fff;font-family:Geist;color:#111}
  .grid{display:grid;grid-template-columns:110px 1fr;gap:16px 24px;align-items:baseline}
  .w{font-family:ui-monospace,monospace;font-size:11px;color:rgb(120,120,120)}
  .s{font-size:22px}
</style></head>
<body>
<div class="grid">
  <div class="w">400 · Regular</div><div class="s" style="font-weight:400">Hello, how are you?</div>
  <div class="w">500 · Medium</div><div class="s" style="font-weight:500">Hello, how are you?</div>
  <div class="w">600 · SemiBold</div><div class="s" style="font-weight:600">Hello, how are you?</div>
  <div class="w">700 · Bold</div><div class="s" style="font-weight:700">Hello, how are you?</div>
  <div class="w">800 · ExtraBold</div><div class="s" style="font-weight:800">Hello, how are you?</div>
  <div class="w">900 · Black</div><div class="s" style="font-weight:900">Hello, how are you?</div>
</div>
</body></html>
