<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tok{padding:10px 14px;border:1px solid var(--border-soft);border-radius:10px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
  .chip{width:22px;height:22px;border-radius:6px;border:1px solid rgba(0,0,0,0.08)}
  .lbl{font-weight:700}
  code{font-family:ui-monospace,monospace;color:var(--fg-soft);font-size:11px}
</style></head>
<body>
<div class="grid">
  <div class="tok"><span class="lbl">--bg-hero</span><span><code>yellow-500</code><span class="chip" style="background:var(--bg-hero);vertical-align:middle;margin-left:6px"></span></span></div>
  <div class="tok"><span class="lbl">--action-learn</span><span><code>green-400</code><span class="chip" style="background:var(--action-learn);vertical-align:middle;margin-left:6px"></span></span></div>
  <div class="tok"><span class="lbl">--action-practice</span><span><code>blue-500</code><span class="chip" style="background:var(--action-practice);vertical-align:middle;margin-left:6px"></span></span></div>
  <div class="tok"><span class="lbl">--action-primary</span><span><code>black</code><span class="chip" style="background:var(--action-primary);vertical-align:middle;margin-left:6px"></span></span></div>
  <div class="tok"><span class="lbl">--fg</span><span><code>ink</code><span class="chip" style="background:var(--fg);vertical-align:middle;margin-left:6px"></span></span></div>
  <div class="tok"><span class="lbl">--fg-muted</span><span><code>ink-2</code><span class="chip" style="background:var(--fg-muted);vertical-align:middle;margin-left:6px"></span></span></div>
  <div class="tok"><span class="lbl">--border</span><span><code>gray-350</code><span class="chip" style="background:var(--border);vertical-align:middle;margin-left:6px"></span></span></div>
  <div class="tok"><span class="lbl">--divider</span><span><code>gray-200</code><span class="chip" style="background:var(--divider);vertical-align:middle;margin-left:6px"></span></span></div>
</div>
</body></html>
