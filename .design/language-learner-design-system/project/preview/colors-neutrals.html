<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .sw{width:96px;height:96px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px;line-height:1.3;box-sizing:border-box;border:1px solid rgba(0,0,0,0.08)}
  .sw b{display:block;font-weight:700;font-size:11px}
  .sw code{font-family:ui-monospace,monospace;opacity:.7;font-size:10px}
  .on-dark{color:#fff}
</style></head>
<body>
<div class="row">
  <div class="sw on-dark" style="background:var(--ll-black)"><b>Black</b><code>#131111</code></div>
  <div class="sw on-dark" style="background:var(--ll-ink-2)"><b>Ink 2</b><code>#323131</code></div>
  <div class="sw on-dark" style="background:var(--ll-gray-600)"><b>Gray 600</b><code>#868686</code></div>
  <div class="sw" style="background:var(--ll-gray-350);color:#000"><b>Gray 350</b><code>#A69F9F</code></div>
  <div class="sw" style="background:var(--ll-gray-200);color:#000"><b>Gray 200</b><code>#D9D9D9</code></div>
  <div class="sw" style="background:var(--ll-gray-150);color:#000"><b>Gray 150</b><code>#E7E7E7</code></div>
  <div class="sw" style="background:var(--ll-gray-100);color:#000"><b>Gray 100</b><code>#EBE8E8</code></div>
  <div class="sw" style="background:var(--ll-off-white);color:#000;border:1px solid #ddd"><b>Off-white</b><code>#FFF9F9</code></div>
</div>
</body></html>
