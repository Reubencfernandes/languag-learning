<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:30px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .x{width:25px;height:25px;color:var(--ll-gray-400);font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .track{flex:1;height:24px;background:var(--ll-gray-200);border-radius:6px;overflow:hidden}
  .fill{height:100%;background:linear-gradient(var(--ll-yellow-500) 0%, var(--ll-orange-500) 100%);border-radius:6px}
  .cap{font-size:11px;font-family:ui-monospace,monospace;color:var(--fg-soft)}
</style></head>
<body>
  <div class="row"><span class="x">✕</span><div class="track"><div class="fill" style="width:15%"></div></div></div>
  <div class="row"><span class="x">✕</span><div class="track"><div class="fill" style="width:45%"></div></div></div>
  <div class="row"><span class="x">✕</span><div class="track"><div class="fill" style="width:85%"></div></div></div>
  <div class="cap">close icon 25px · track 24/6 · fill yellow→orange gradient</div>
</body></html>
