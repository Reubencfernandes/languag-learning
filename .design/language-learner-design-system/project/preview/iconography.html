<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:30px;background:#fff;font-family:var(--font-sans);display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .r{display:flex;flex-direction:column;align-items:center;gap:6px}
  .flag{width:64px;height:34px;border-radius:2px;border:1px solid #999090;background-size:cover;background-position:center}
  .ico{width:32px;height:32px;color:var(--ll-gray-300)}
  .lbl{font-size:11px;font-family:ui-monospace,monospace;color:var(--fg-soft)}
</style></head>
<body>
  <div class="r"><div class="flag" style="background-image:url(../assets/flag-uk.png)"></div><div class="lbl">flag-uk</div></div>
  <div class="r"><div class="flag" style="background-image:url(../assets/flag-japan.png)"></div><div class="lbl">flag-japan</div></div>
  <div class="r"><img class="ico" src="../assets/icon-profile.svg"><div class="lbl">profile</div></div>
  <div class="r"><img class="ico" src="../assets/icon-sword.svg"><div class="lbl">sword (practice)</div></div>
  <div class="r"><svg class="ico" viewBox="0 0 22 18" fill="currentColor"><path d="M11 0L0 6l4 2.18v6L11 18l7-3.82v-6l2-1.09V14h2V6L11 0z"/></svg><div class="lbl">learn (mdi)</div></div>
  <div class="r"><span style="font-size:28px;color:var(--ll-gray-400)">✕</span><div class="lbl">close (ix)</div></div>
</body></html>
