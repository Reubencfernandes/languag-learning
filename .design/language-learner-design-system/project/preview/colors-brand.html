<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{width:110px;height:110px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#000;font-size:11px;line-height:1.3;box-sizing:border-box;border:1px solid rgba(0,0,0,0.06)}
  .sw b{display:block;font-weight:700;font-size:12px}
  .sw code{font-family:ui-monospace,monospace;opacity:.7;font-size:10px}
  .on-dark{color:#fff}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--ll-yellow-500)"><b>Yellow 500</b><code>#FDE249</code></div>
  <div class="sw" style="background:var(--ll-yellow-400)"><b>Yellow 400</b><code>#FFD600</code></div>
  <div class="sw on-dark" style="background:var(--ll-orange-500)"><b>Orange 500</b><code>#D47400</code></div>
  <div class="sw" style="background:var(--ll-green-400)"><b>Green 400</b><code>#49FD8E</code></div>
  <div class="sw on-dark" style="background:var(--ll-green-500)"><b>Green 500</b><code>#54CE01</code></div>
  <div class="sw on-dark" style="background:var(--ll-blue-500)"><b>Blue 500</b><code>#19ADF6</code></div>
</div>
</body></html>
