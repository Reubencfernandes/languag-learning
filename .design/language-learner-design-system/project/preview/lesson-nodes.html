<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:30px;background:#fff;font-family:var(--font-sans);display:flex;gap:30px;align-items:center;flex-wrap:wrap}
  .node-wrap{position:relative;width:91px;height:85px}
  .halo{position:absolute;inset:0;border-radius:50%;background:var(--ll-gray-150)}
  .node{position:absolute;left:7px;top:6px;width:78px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
  .cap{font-size:11px;font-family:ui-monospace,monospace;color:var(--fg-soft);text-align:center;margin-top:6px}
</style></head>
<body>
  <div>
    <div class="node-wrap"><div class="halo"></div><div class="node" style="background:var(--ll-green-500)">★</div></div>
    <div class="cap">done · green-500</div>
  </div>
  <div>
    <div class="node-wrap"><div class="halo"></div><div class="node" style="background:var(--ll-yellow-400);color:#000">▶</div></div>
    <div class="cap">current · yellow-400</div>
  </div>
  <div>
    <div class="node-wrap"><div class="halo"></div><div class="node" style="background:var(--ll-gray-150);color:var(--ll-gray-300)">🔒</div></div>
    <div class="cap">locked · gray-150</div>
  </div>
</body></html>
