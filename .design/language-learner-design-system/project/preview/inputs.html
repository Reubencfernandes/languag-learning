<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:var(--font-sans);display:flex;flex-direction:column;gap:14px;width:340px}
  .lbl{font-weight:700;font-size:14px;color:#000}
  .field{height:48px;border-radius:11px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;padding:0 16px;gap:12px}
  .flag{width:36px;height:19px;border-radius:2px;border:1px solid #999090;background-size:cover;background-position:center}
  .val{font-size:14px}
  .tx{border-radius:12px;border:1px solid var(--border-soft);padding:16px;height:120px;color:var(--fg-placeholder);font-family:var(--font-ui);font-size:13px}
</style></head>
<body>
  <div>
    <div class="lbl">My language</div>
    <div class="field" style="margin-top:8px"><div class="flag" style="background-image:url(../assets/flag-uk.png)"></div><span class="val">English</span></div>
  </div>
  <div>
    <div class="lbl">Learning Language</div>
    <div class="field" style="margin-top:8px"><div class="flag" style="background-image:url(../assets/flag-japan.png)"></div><span class="val">japanese</span></div>
  </div>
  <div>
    <div class="lbl">Translate</div>
    <div class="tx" style="margin-top:8px">Write your translate here</div>
  </div>
</body></html>
